base_model: Qwen/Qwen2.5-7B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
load_in_4bit: true
strict: false

datasets:
  - path: datasets/instruction_samples.jsonl
    type: alpaca

adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj

sequence_len: 4096
sample_packing: true
pad_to_sequence_len: true

bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bf16: true
fp16: false

gradient_accumulation_steps: 4
micro_batch_size: 1
num_epochs: 2
optimizer: adamw_bnb_8bit
learning_rate: 0.0002
lr_scheduler: cosine

output_dir: models/loras/qwen-qlora-demo
